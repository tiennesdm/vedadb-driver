name: release-driver-rust

on:
  push:
    tags:
      - 'drivers/rust-v*.*.*'

concurrency:
  group: release-driver-rust-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/drivers/rust-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            drivers/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('drivers/rust/Cargo.toml') }}

      - name: Align Cargo.toml version with tag
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG##drivers/rust-v}"
          # Only touch the [package] version field.
          sed -i -E "0,/^version = \".*\"$/s//version = \"$VERSION\"/" Cargo.toml

      - name: cargo test
        run: cargo test --all-features

      - name: cargo publish (dry-run)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --dry-run --allow-dirty --token "$CARGO_REGISTRY_TOKEN"

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --allow-dirty --token "$CARGO_REGISTRY_TOKEN"

      - name: Job summary
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG##drivers/rust-v}"
          {
            echo "### VedaDB Rust driver published"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Registry: https://crates.io/crates/vedadb/$VERSION"
            echo "- Docs: https://docs.rs/vedadb/$VERSION"
            echo "- Install: \`cargo add vedadb@$VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"
