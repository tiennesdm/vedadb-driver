name: release-driver-go

on:
  push:
    tags:
      - 'go-v*.*.*'

concurrency:
  group: release-driver-go-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-and-index:
    name: Verify + nudge module proxy
    if: startsWith(github.ref, 'refs/tags/go-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Ping proxy.golang.org to force index
        env:
          GOPROXY: proxy.golang.org
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG##go-v}"
          MODULE="github.com/tiennesdm/vedadb-driver/go"
          echo "Requesting proxy index for $MODULE@v$VERSION"
          # First call may 404 until index propagates; retry a few times.
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/proxy.json -w "%{http_code}" \
              "https://proxy.golang.org/${MODULE}/@v/v${VERSION}.info" || true)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then break; fi
            sleep 15
          done
          cat /tmp/proxy.json || true

      - name: Job summary
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG##go-v}"
          {
            echo "### VedaDB Go driver indexed"
            echo ""
            echo "- Version: \`v$VERSION\`"
            echo "- Registry: https://pkg.go.dev/github.com/tiennesdm/vedadb-driver/go@v$VERSION"
            echo "- Install: \`go get github.com/tiennesdm/vedadb-driver/go@v$VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"
