name: release-driver-node

on:
  push:
    tags:
      - 'drivers/node-v*.*.*'

concurrency:
  group: release-driver-node-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/drivers/node-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install deps
        run: npm ci || npm install

      - name: Run tests
        run: npm test

      - name: Align package.json version with tag
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG##drivers/node-v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Job summary
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          VERSION="${TAG##drivers/node-v}"
          {
            echo "### VedaDB Node driver published"
            echo ""
            echo "- Version: \`$VERSION\`"
            echo "- Registry: https://www.npmjs.com/package/vedadb/v/$VERSION"
            echo "- Install: \`npm install vedadb@$VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"
